name: ci
run-name: ci (${github.event_name})
on:
  pull_request_target:
  pull_request:
  pull_request_review:
    types: [submitted]
jobs:
  check_approved:
    runs-on: ubuntu-slim
    # pull_request_target is considered safe, no check needed
    if: ${{ github.event_name != 'pull_request_target' }}
    steps:
      - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          retries: 3
          script: |
            const maintainer = 'ThisGuyCodes';

            switch (context.eventName) {
              case 'pull_request_review': {
                const review = context.payload.review;
                if (review.user.login === maintainer && review.state === 'APPROVED') {
                  core.info('Approved by thisguycodes, proceeding');
                  return;
                }
                break;
              }

              case 'pull_request': {
                // If the author is the maintainer, no approval needed
                if (context.payload.pull_request.user.login === maintainer) {
                  core.info('Author is maintainer, proceeding');
                  return;
                }

                const { data: reviews } = await github.rest.pulls.listReviews({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.payload.pull_request.number,
                });

                const commitId = context.payload.pull_request.head.sha;
                const approved = reviews.some(review =>
                  review.user.login === maintainer &&
                  review.state === 'APPROVED' &&
                  review.commit_id === commitId
                );

                if (!approved) {
                  core.setFailed('No approval for this commit from maintainer found');
                }
              }
            }

  show_commit:
    runs-on: ubuntu-slim
    needs: check_approved
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
      - run: git log -1
